<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title description">
  <title id="title">Userpilot AI visibility snapshot</title>
  <desc id="description">Userpilot appeared in 15 of 15 AI answers, while Appcues also appeared in 15 of 15.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8faff"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#18223d" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1200" height="630" rx="34" fill="url(#bg)"/>
  <circle cx="1110" cy="84" r="148" fill="#4f6ef7" opacity="0.10"/>
  <circle cx="80" cy="590" r="180" fill="#8b5cf6" opacity="0.08"/>

  <g transform="translate(70 56)">
    <rect x="0" y="0" width="50" height="50" rx="14" fill="#17213b"/>
    <path d="M14 25h22M25 14v22M17.2 17.2l15.6 15.6M32.8 17.2L17.2 32.8" stroke="#fff" stroke-width="3.2" stroke-linecap="round"/>
    <text x="68" y="23" fill="#17213b" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">QUERYARC</text>
    <text x="68" y="46" fill="#65708a" font-family="Arial, Helvetica, sans-serif" font-size="16">AI Visibility Snapshot</text>
  </g>

  <text x="70" y="180" fill="#17213b" font-family="Arial, Helvetica, sans-serif" font-size="58" font-weight="760">Userpilot is visible.</text>
  <text x="70" y="238" fill="#4f6ef7" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="760">But it does not own the category.</text>
  <text x="70" y="285" fill="#65708a" font-family="Arial, Helvetica, sans-serif" font-size="21">3 buyer questions · ChatGPT, Gemini, Claude, Grok and Perplexity</text>

  <g filter="url(#shadow)">
    <rect x="70" y="330" width="326" height="164" rx="22" fill="#ffffff"/>
    <rect x="437" y="330" width="326" height="164" rx="22" fill="#ffffff"/>
    <rect x="804" y="330" width="326" height="164" rx="22" fill="#ffffff"/>
  </g>
  <text x="98" y="373" fill="#65708a" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">USERPILOT MENTIONS</text>
  <text x="98" y="443" fill="#17213b" font-family="Arial, Helvetica, sans-serif" font-size="60" font-weight="780">15/15</text>
  <text x="465" y="373" fill="#65708a" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">TOP RIVAL</text>
  <text x="465" y="425" fill="#17213b" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="780">Appcues</text>
  <text x="465" y="462" fill="#d14f65" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700">also 15/15</text>
  <text x="832" y="373" fill="#65708a" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">OTHER RIVALS</text>
  <text x="832" y="421" fill="#17213b" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="760">Pendo 11/15</text>
  <text x="832" y="462" fill="#17213b" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="760">Chameleon 9/15</text>

  <rect x="70" y="532" width="1060" height="1" fill="#dce2f3"/>
  <text x="70" y="576" fill="#17213b" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">High visibility. Zero separation from the closest competitor.</text>
  <text x="1130" y="576" text-anchor="end" fill="#4f6ef7" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700">View the full snapshot →</text>
</svg>
